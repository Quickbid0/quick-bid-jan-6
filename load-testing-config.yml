# LOAD TESTING EXECUTION SCRIPTS
# ================================

# run-load-test.sh
#!/bin/bash

echo "🚀 Starting QuickMela Load Testing"
echo "=================================="

# Install dependencies
echo "📦 Installing Artillery..."
npm install -g artillery

# Run Artillery load test
echo "🎯 Running Artillery Load Test..."
artillery run artillery.yml --output results.json

# Generate HTML report
echo "📊 Generating HTML Report..."
artillery report results.json --output report.html

# Run K6 as alternative
echo "🔄 Running K6 Load Test..."
k6 run k6-script.js --out json=results-k6.json

echo "✅ Load Testing Complete"
echo "📈 Check results.json and report.html for detailed results"


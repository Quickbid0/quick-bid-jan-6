# QuickMela Nginx Configuration for Railway
# This file configures additional security headers and optimizations
# Railway handles SSL/TLS automatically, but we add extra security layers

# ================================
# UPSTREAM CONFIGURATION
# ================================

upstream quickmela_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# ================================
# HTTP TO HTTPS REDIRECT
# ================================
# Note: Railway handles this automatically, but included for completeness

server {
    listen 80;
    server_name quickmela.com www.quickmela.com admin.quickmela.com;
    return 301 https://$server_name$request_uri;
}

# ================================
# MAIN APPLICATION SERVER
# ================================

server {
    listen 443 ssl http2;
    server_name quickmela.com www.quickmela.com;

    # SSL Configuration (handled by Railway)
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;

    # ================================
    # SECURITY HEADERS
    # ================================

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Strict Transport Security (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.quickmela.com wss://api.quickmela.com; frame-ancestors 'none';" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Feature Policy / Permissions Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Remove server identification
    more_clear_headers Server;
    add_header X-Powered-By "QuickMela/1.0.0" always;

    # ================================
    # RATE LIMITING
    # ================================

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=2r/m;

    # ================================
    # GZIP COMPRESSION
    # ================================

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private must-revalidate auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ================================
    # STATIC ASSETS
    # ================================

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Static-Asset "true";

        # Serve from Railway's built-in CDN if available
        try_files $uri @backend;
    }

    # API routes
    location /api/ {
        # Rate limiting for API calls
        limit_req zone=api burst=20 nodelay;

        # Proxy to backend
        proxy_pass http://quickmela_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # WhatsApp webhooks (special handling)
    location /webhooks/whatsapp {
        # Less restrictive rate limiting for webhooks
        limit_req zone=api burst=50 nodelay;

        # Proxy to backend
        proxy_pass http://quickmela_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webhook specific headers
        proxy_set_header X-Webhook-Source "whatsapp";
        proxy_set_header X-Webhook-Timestamp $msec;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://quickmela_backend;
        proxy_set_header Host $host;
    }

    # Main application (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;

        # Security for main app
        limit_req zone=api burst=100 nodelay;

        # Add security headers for HTML
        add_header X-Application "QuickMela" always;
        add_header X-Environment "production" always;
    }

    # ================================
    # ERROR PAGES
    # ================================

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # ================================
    # LOGGING
    # ================================

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
}

# ================================
# ADMIN DASHBOARD SERVER
# ================================

server {
    listen 443 ssl http2;
    server_name admin.quickmela.com;

    # SSL Configuration (handled by Railway)

    # ================================
    # ADMIN SECURITY HEADERS
    # ================================

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.quickmela.com;" always;
    add_header X-Admin-Access "authorized" always;

    # Stricter rate limiting for admin
    limit_req_zone $binary_remote_addr zone=admin:10m rate=1r/s;

    location / {
        limit_req zone=admin burst=10 nodelay;

        try_files $uri $uri/ /admin/index.html;

        # Admin-specific headers
        add_header X-Admin-Panel "true" always;
        add_header X-Launch-Control "enabled" always;
    }

    location /api/admin/ {
        limit_req zone=admin burst=20 nodelay;

        proxy_pass http://quickmela_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Admin-Request "true";
        proxy_cache_bypass $http_upgrade;
    }
}

# ================================
# MONITORING & SECURITY
# ================================

# Block common exploit attempts
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~ /(wp-admin|wp-login|admin|administrator|phpmyadmin|phpMyAdmin|pma) {
    deny all;
    access_log off;
    log_not_found off;
    return 444;
}

# Block access to sensitive files
location ~ \.(env|git|svn|DS_Store|htaccess|htpasswd)$ {
    deny all;
    access_log off;
    log_not_found off;
    return 444;
}


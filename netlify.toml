[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_AUTH_MODE = "real"
  VITE_API_URL = "https://web-production-b7c8b.up.railway.app"
  VITE_RAZORPAY_KEY = "rzp_test_SCwiApUPtqIXUy"
  VITE_SERVER_URL = "https://web-production-b7c8b.up.railway.app"
  VITE_APP_URL = "https://quickmela.netlify.app"

[dev]
  command = "npm run dev"
  targetPort = 3007

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' data: https://checkout.razorpay.com https://*.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://picsum.photos https://placehold.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://o4510889698131968.ingest.us.sentry.io https://web-production-b7c8b.up.railway.app http://localhost:4011 https://api.razorpay.com; frame-src 'self' https://checkout.razorpay.com https://*.razorpay.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"
